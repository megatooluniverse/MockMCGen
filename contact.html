<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Mock Magazine Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; color: #1f2937; margin: 0; padding: 40px 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #2563eb; font-weight: 800; margin-bottom: 10px; }
        p { margin-bottom: 25px; color: #4b5563; }
        .contact-box { background: #f9fafb; border: 2px dashed #d1d5db; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .contact-box a { color: #2563eb; font-size: 1.2rem; font-weight: 600; text-decoration: none; }
        .back-link { display: inline-block; color: #2563eb; text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        <p>Have a question, feedback, or found a bug? We'd love to hear from you!</p>
        
        <div class="contact-box">
            <p style="margin-bottom: 10px; font-weight: 600;">Email us at:</p>
            <a href="mailto:support@mockmagazine.example.com">support@mockmagazine.com</a>
        </div>

        <p style="font-size: 0.9rem;">Note: This is a free tool maintained for educational and entertainment purposes.</p>
